version: "3.9"

services:
  stats-api:
    build:
      context: ./node-api-rest
      dockerfile: Dockerfile
    container_name: stats-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-}
    networks:
      - qr-stats-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  qr-api:
    build:
      context: ./go-api-rest
      dockerfile: Dockerfile
    container_name: qr-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_API_URL: http://stats-api:3000
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      stats-api:
        condition: service_healthy
    networks:
      - qr-stats-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: qr-frontend
    ports:
      - "8081:80"
    depends_on:
      - qr-api
    networks:
      - qr-stats-net

networks:
  qr-stats-net:
    driver: bridge
