version: "3.9"

# Orquesta las dos APIs del desafío:
#   - qr-api    (Go / Fiber)   -> expone :8080, calcula la factorización QR
#   - stats-api (Node / Express) -> expone :3000, calcula estadísticas sobre Q y R
#
# qr-api le habla a stats-api por la red interna de Docker usando el nombre
# del servicio ("stats-api") como hostname, sin necesidad de exponer puertos
# públicos adicionales para esa comunicación interna.

services:
  stats-api:
    build:
      context: ./node-api-rest
      dockerfile: Dockerfile
    container_name: stats-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-}
    networks:
      - qr-stats-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  qr-api:
    build:
      context: ./go-api-rest
      dockerfile: Dockerfile
    container_name: qr-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_API_URL: http://stats-api:3000
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      stats-api:
        condition: service_healthy
    networks:
      - qr-stats-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: qr-frontend
    ports:
      - "8081:80"
    depends_on:
      - qr-api
    networks:
      - qr-stats-net

networks:
  qr-stats-net:
    driver: bridge
